name: Publish NuGet Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      package-version:
        description: "NuGet package version to publish"
        required: true
        type: string

permissions:
  contents: read

jobs:
  build-and-publish:
    name: Build and publish NuGet packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "package_version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "package_version=${{ inputs.package-version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore
        run: dotnet restore src/hhnl.My.JDownloader.Api/hhnl.My.JDownloader.Api.IntegrationTests/hhnl.My.JDownloader.Api.IntegrationTests.csproj

      - name: Build
        run: dotnet build src/hhnl.My.JDownloader.Api/hhnl.My.JDownloader.Api.IntegrationTests/hhnl.My.JDownloader.Api.IntegrationTests.csproj --configuration Release --no-restore /p:ContinuousIntegrationBuild=true

      - name: Pack core package
        run: dotnet pack src/hhnl.My.JDownloader.Api/hhnl.My.JDownloader.Api/hhnl.My.JDownloader.Api.csproj --configuration Release --no-build --output artifacts/packages /p:PackageVersion=${{ steps.version.outputs.package_version }} /p:ContinuousIntegrationBuild=true

      - name: Pack dependency injection package
        run: dotnet pack src/hhnl.My.JDownloader.Api/hhnl.My.JDownloader.Api.DependencyInjection/hhnl.My.JDownloader.Api.DependencyInjection.csproj --configuration Release --no-build --output artifacts/packages /p:PackageVersion=${{ steps.version.outputs.package_version }} /p:ContinuousIntegrationBuild=true

      - name: NuGet login
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish packages
        run: dotnet nuget push "artifacts/packages/*.nupkg" --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source "https://api.nuget.org/v3/index.json" --skip-duplicate
